name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-node-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run full backend test suite
        run: cd backend && NODE_ENV=test npm test -- --runInBand

      - name: Run targeted backend contract tests
        run: |
          cd backend
          NODE_ENV=test npm test -- --runInBand --testPathPatterns="pagination.routes.test.ts|recommendationService.tracking.test.ts|user-loops.smoke.test.ts"

      - name: Upload backend coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          fail_ci_if_error: false

  test-ml-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml-service/requirements.txt
          pip install pytest pytest-cov
      - name: Run ML service tests
        run: |
          cd ml-service
          pytest tests/ -v --cov=app --cov-report=term-missing

  build:
    needs: [test-node-backend, test-ml-service]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Build Node backend
        run: |
          cd backend
          npm ci
          npm run build
